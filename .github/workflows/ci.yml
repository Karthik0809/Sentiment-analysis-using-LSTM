name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master]

jobs:
  # ── Lint & Tests ──────────────────────────────────────────────────
  test:
    name: Lint + Unit Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version: ["3.10", "3.11"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # Install CPU-only torch for CI speed
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install -e ".[dev]" || pip install -r requirements.txt
          pip install pytest pytest-cov

      - name: Run unit tests
        run: |
          pytest tests/ -v --tb=short --cov=src --cov-report=term-missing

      - name: Upload coverage report
        uses: codecov/codecov-action@v4
        if: matrix.python-version == '3.11'
        with:
          fail_ci_if_error: false

  # ── Docker Build ──────────────────────────────────────────────────
  docker:
    name: Docker Build (API + Streamlit)
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build API image (dry-run, no push)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: deployment/Dockerfile
          push: false
          tags: sentiment-api:ci
          cache-from: type=gha
          cache-to:   type=gha,mode=max

      - name: Build Streamlit image (dry-run, no push)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: deployment/Dockerfile.streamlit
          push: false
          tags: sentiment-ui:ci
          cache-from: type=gha
          cache-to:   type=gha,mode=max

  # ── Optional: Push to Docker Hub on tagged release ────────────────
  publish:
    name: Publish Docker Image
    runs-on: ubuntu-latest
    needs: [test, docker]
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract version tag
        id: tag
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Push API image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: deployment/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/sentiment-api:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/sentiment-api:${{ steps.tag.outputs.VERSION }}
