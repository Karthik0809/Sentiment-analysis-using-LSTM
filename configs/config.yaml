data:
  dataset_path: "data/News_Category_Dataset_v3.json"
  max_len: 50
  vocab_size: 50000
  test_size: 0.2
  val_size: 0.1
  positive_categories:
    - "WELLNESS"
    - "ENTERTAINMENT"
    - "FOOD & DRINK"
    - "HEALTHY LIVING"
    - "SPORTS"
    - "GOOD NEWS"
    - "COMEDY"
    - "TRAVEL"
    - "ARTS & CULTURE"
    - "HOME & LIVING"
    - "STYLE & BEAUTY"
    - "PARENTING"
  negative_categories:
    - "POLITICS"
    - "CRIME"
    - "DIVORCE"
    - "WORLD NEWS"
    - "U.S. NEWS"
    - "MEDIA"
    - "WEIRD NEWS"
  neutral_categories:
    - "SCIENCE"
    - "TECH"
    - "BUSINESS"
    - "MONEY"
    - "EDUCATION"
    - "RELIGION"
    - "COLLEGE"
    - "ARTS"
    - "ENVIRONMENT"

model:
  embedding_dim: 128
  hidden_dim: 256
  n_layers: 3
  dropout: 0.4
  num_classes: 3

training:
  batch_size: 64
  epochs: 25
  learning_rate: 0.001
  weight_decay: 1.0e-5
  patience: 5
  checkpoint_dir: "checkpoints"

api:
  host: "0.0.0.0"
  port: 8000
  model_path: "checkpoints/best_model.pt"
  preprocessor_path: "checkpoints/preprocessor.pkl"
